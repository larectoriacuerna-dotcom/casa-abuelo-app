<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>La Casa de mi Abuelo</title>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.383.0/dist/umd/lucide.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --cobalt:#0047AB;--cobalt-light:#E8EEFA;--cobalt-dark:#00337A;
  --cream:#F5F5DC;--cream-dark:#E8E8C0;
  --terra:#E2725B;--terra-light:#FAF0EE;--terra-dark:#B85542;
  --text:#1a1a1a;--text-muted:#555;--border:#ddd;
  --card:#fff;--bg:#F5F5DC;
}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;max-width:420px;margin:0 auto;position:relative}

/* HEADER */
header{background:var(--cobalt);color:#fff;padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:17px;font-weight:600;letter-spacing:0.3px}
.logo span{color:#F5C47A;font-size:13px;display:block;font-weight:400;letter-spacing:1px}
.lang-btn{background:rgba(255,255,255,0.18);border:none;color:#fff;padding:5px 11px;border-radius:20px;font-size:12px;cursor:pointer;font-weight:500}
.lang-btn:hover{background:rgba(255,255,255,0.3)}

/* NAV */
nav{background:var(--cobalt-dark);display:flex;overflow-x:auto;scrollbar-width:none;padding:0 4px;border-bottom:3px solid var(--terra)}
nav::-webkit-scrollbar{display:none}
.nav-btn{flex:0 0 auto;background:none;border:none;color:rgba(255,255,255,0.7);padding:10px 13px;font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;white-space:nowrap;transition:color 0.2s;border-bottom:3px solid transparent;margin-bottom:-3px}
.nav-btn.active,.nav-btn:hover{color:#fff;border-bottom-color:var(--terra)}
.nav-btn i{width:16px;height:16px}

/* SECTIONS */
main{flex:1;overflow-y:auto;padding:16px}
.section{display:none}
.section.active{display:block}

/* CARDS */
.card{background:var(--card);border-radius:14px;padding:16px;margin-bottom:14px;border:1px solid rgba(0,71,171,0.12);box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.card-title{font-size:15px;font-weight:600;color:var(--cobalt);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.card-title i{width:18px;height:18px;color:var(--terra)}

/* WELCOME */
.welcome-banner{background:linear-gradient(135deg,var(--cobalt) 0%,var(--cobalt-dark) 100%);border-radius:16px;padding:22px 18px;margin-bottom:16px;color:#fff;text-align:center;position:relative;overflow:hidden}
.welcome-banner::before{content:"";position:absolute;top:-30px;right:-30px;width:100px;height:100px;background:var(--terra);opacity:0.18;border-radius:50%}
.welcome-banner h2{font-size:20px;font-weight:600;margin-bottom:6px}
.welcome-banner p{font-size:13px;opacity:0.85;line-height:1.5}
.address-badge{display:inline-block;background:rgba(255,255,255,0.15);border-radius:20px;padding:6px 12px;font-size:11px;margin-top:10px;letter-spacing:0.5px;cursor:pointer;transition:background 0.2s}
.address-badge:hover{background:rgba(255,255,255,0.25)}

/* WIFI & INFO */
.wifi-code{background:var(--cobalt-light);border-radius:10px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;margin-top:8px;cursor:pointer}
.wifi-code span{font-size:16px;font-weight:700;letter-spacing:1px;color:var(--cobalt)}
.wifi-copy{background:var(--cobalt);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer}
.wifi-copy:hover{background:var(--cobalt-dark)}

.panic-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.panic-btn{border:none;border-radius:12px;padding:14px 10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;font-size:12px;font-weight:600;transition:transform 0.15s}
.panic-btn:active{transform:scale(0.96)}
.panic-btn i{width:22px;height:22px}
.panic-btn.host{background:var(--cobalt-light);color:var(--cobalt)}
.panic-btn.emergency{background:#FDE8E8;color:#C0392B}
.panic-btn.wifi{background:#E8F8F0;color:#1a7a45}
.panic-btn.maps{background:#FFF3E0;color:#E65100}

.step{display:flex;gap:12px;margin-bottom:12px;align-items:flex-start}
.step-num{width:26px;height:26px;border-radius:50%;background:var(--cobalt);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-text{font-size:14px;line-height:1.5;color:var(--text-muted)}
.info-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.info-row i{width:16px;height:16px;color:var(--terra);flex-shrink:0}
.info-label{font-size:12px;color:var(--text-muted);margin-bottom:2px}
.info-val{font-size:14px;font-weight:500}

/* ACCORDION (FAQ & INVENTORY) */
.faq-item{background:var(--card);border-radius:12px;margin-bottom:10px;border:1px solid rgba(0,71,171,0.1);overflow:hidden}
.faq-q{padding:14px 16px;font-size:14px;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center; color:var(--cobalt)}
.faq-q i{width:16px;height:16px;color:var(--terra);transition:transform 0.2s;flex-shrink:0}
.faq-a{padding:0 16px;font-size:13px;color:var(--text-muted);line-height:1.6;max-height:0;overflow:hidden;transition:max-height 0.3s,padding 0.3s}
.faq-item.open .faq-a{max-height:500px;padding-bottom:14px}
.faq-item.open .faq-q i{transform:rotate(180deg)}
.inv-list {padding-left: 18px; margin-top: 5px; list-style-type: disc;}
.inv-list li {margin-bottom: 6px;}

/* POI CARDS */
.poi-card{background:var(--card);border-radius:14px;overflow:hidden;margin-bottom:14px;border:1px solid rgba(0,71,171,0.1)}
.poi-img{width:100%;height:100px;background:var(--cobalt-light);display:flex;align-items:center;justify-content:center;font-size:40px}
.poi-body{padding:14px}
.poi-name{font-size:15px;font-weight:600;margin-bottom:4px}
.poi-desc{font-size:13px;color:var(--text-muted);line-height:1.5;margin-bottom:10px}
.maps-btn{background:var(--terra);color:#fff;border:none;border-radius:10px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:6px}
.maps-btn:hover{background:var(--terra-dark)}
.maps-btn i{width:15px;height:15px}

/* EMERGENCY */
.emergency-card{background:var(--card);border-radius:14px;padding:14px;margin-bottom:12px;border:1px solid #FCA5A5;display:flex;align-items:center;gap:12px}
.emergency-card.ok{border-color:rgba(0,71,171,0.15)}
.emerg-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.emerg-icon.blue{background:var(--cobalt-light);color:var(--cobalt)}
.emerg-icon.green{background:#E8F8F0;color:#1a7a45}
.emerg-icon i{width:20px;height:20px}
.emerg-info{flex:1}
.emerg-name{font-size:14px;font-weight:600;margin-bottom:2px}
.emerg-num{font-size:13px;color:var(--text-muted)}
.call-btn{background:var(--cobalt);color:#fff;border:none;border-radius:8px;padding:7px 13px;font-size:12px;font-weight:600;cursor:pointer;}

.sec-heading{font-size:14px;font-weight:600;color:var(--cobalt);letter-spacing:1px;text-transform:uppercase;margin:24px 0 12px;display:flex;align-items:center;gap:8px}
.sec-heading::after{content:"";flex:1;height:1px;background:rgba(0,71,171,0.15)}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--cobalt);color:#fff;padding:8px 20px;border-radius:30px;font-size:13px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

  <div class="logo">
    La Casa de mi Abuelo
    <span id="address-sub">Benito Juárez 61</span>
  </div>

</header>

    <i data-lucide="book-open"></i><span data-i="nav_manual">Manual</span>

    <i data-lucide="map-pin"></i><span data-i="nav_
